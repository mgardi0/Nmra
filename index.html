<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستەمی هەژمارکردنی کۆنمرە و زانکۆکان</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rabar&display=swap');
        body { font-family: 'Rabar', Tahoma, sans-serif; }
        .bg-animated {
            background: linear-gradient(-45deg, #e0e7ff, #c7d2fe, #ddd6fe, #ede9fe);
            background-size: 300% 300%;
            animation: gradientMove 20s ease infinite;
        }
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="min-h-screen w-full relative bg-animated text-slate-800 p-4 md:p-8">

    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="md:col-span-1 glass-card rounded-3xl p-6 h-fit">
            <h2 class="text-2xl font-bold text-indigo-800 mb-6 border-b-2 border-indigo-200 pb-2">نمرەی وانەکان بنووسە</h2>
            <form id="gradeForm" class="space-y-4">
                <div class="flex justify-between items-center bg-white/50 p-2 rounded-xl">
                    <label class="font-semibold text-slate-700">بیرکاری</label>
                    <input type="number" id="math" min="0" max="100" required class="w-20 p-2 border rounded-lg text-center outline-none focus:ring-2 focus:ring-indigo-400">
                </div>
                <div class="flex justify-between items-center bg-white/50 p-2 rounded-xl">
                    <label class="font-semibold text-slate-700">زیندەوەرزانی</label>
                    <input type="number" id="biology" min="0" max="100" required class="w-20 p-2 border rounded-lg text-center outline-none focus:ring-2 focus:ring-indigo-400">
                </div>
                <div class="flex justify-between items-center bg-white/50 p-2 rounded-xl">
                    <label class="font-semibold text-slate-700">کیمیا</label>
                    <input type="number" id="chemistry" min="0" max="100" required class="w-20 p-2 border rounded-lg text-center outline-none focus:ring-2 focus:ring-indigo-400">
                </div>
                <div class="flex justify-between items-center bg-white/50 p-2 rounded-xl">
                    <label class="font-semibold text-slate-700">فیزیا</label>
                    <input type="number" id="physics" min="0" max="100" required class="w-20 p-2 border rounded-lg text-center outline-none focus:ring-2 focus:ring-indigo-400">
                </div>
                <div class="flex justify-between items-center bg-white/50 p-2 rounded-xl">
                    <label class="font-semibold text-slate-700">ئینگلیزی</label>
                    <input type="number" id="english" min="0" max="100" required class="w-20 p-2 border rounded-lg text-center outline-none focus:ring-2 focus:ring-indigo-400">
                </div>
                <div class="flex justify-between items-center bg-white/50 p-2 rounded-xl">
                    <label class="font-semibold text-slate-700">کوردی</label>
                    <input type="number" id="kurdish" min="0" max="100" required class="w-20 p-2 border rounded-lg text-center outline-none focus:ring-2 focus:ring-indigo-400">
                </div>
                <div class="flex justify-between items-center bg-white/50 p-2 rounded-xl">
                    <label class="font-semibold text-slate-700">عەرەبی</label>
                    <input type="number" id="arabic" min="0" max="100" required class="w-20 p-2 border rounded-lg text-center outline-none focus:ring-2 focus:ring-indigo-400">
                </div>

                <button type="submit" class="w-full mt-4 py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-lg">
                    ئەنجامەکانم پێشان بدە
                </button>
            </form>
        </div>

        <div class="md:col-span-2 glass-card rounded-3xl p-6">
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 bg-indigo-50 p-4 rounded-2xl border border-indigo-100">
                <div class="text-center md:text-right mb-4 md:mb-0">
                    <h3 class="text-lg font-semibold text-slate-600">تێکڕای گشتی (کۆنمرە):</h3>
                    <p id="totalScore" class="text-4xl font-bold text-indigo-700 mt-1">00.00</p>
                </div>
                <div class="text-center md:text-right">
                    <h3 class="text-lg font-semibold text-slate-600">تێکڕای زانستی (بەپێی کریدیت):</h3>
                    <p id="weightedScore" class="text-4xl font-bold text-emerald-600 mt-1">00.00</p>
                </div>
            </div>

            <h3 class="text-xl font-bold text-slate-800 mb-4">ئەو بەشانەی چانسی وەرگرتنت تێیاندا هەیە:</h3>
            
            <div id="collegesList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="p-4 bg-white/50 rounded-xl border border-slate-200 text-center text-slate-500">
                    تکایە سەرەتا نمرەکانت داخڵ بکە...
                </div>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
